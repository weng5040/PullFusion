mirrors:
  dockerhub:
    - url: https://docker.1ms.run
      priority: 1
      display_name: 1ms-docker
    - url: https://docker.xuanyuan.me
      priority: 2
      display_name: xuanyuan
    - url: https://docker.m.daocloud.io
      priority: 3
      display_name: daocloud
    - url: https://docker.sparkcr.cn
      priority: 4
      display_name: sparkcr
    - url: https://docker.1panel.live
      priority: 5
      display_name: 1panel
    - url: https://hub.1panel.dev
      priority: 6
      display_name: 1panel-dev
    - url: https://dockerproxy.cool
      priority: 7
      display_name: dp-cool
    - url: https://hub1.nat.tf
      priority: 8
      display_name: nat1
    - url: https://hub4.nat.tf
      priority: 9
      display_name: nat4
  ghcr: []

proxies:
  enabled: false
  nodes: []

server:
  registry_port: 443
  proxy_port: 5003
  registry_domain: docker.inyo.cc
  tls:
    cert: data/docker.inyo.cc.crt
    key: data/docker.inyo.cc.key

downloader:
  max_concurrent_per_blob: 9
  max_concurrent_global: 64
  chunk_min_size: 262144
  chunk_max_size: 33554432
  node_fail_threshold: 3
  speed_test_interval: 300s
  speed_test_url: https://github.com/linkease/istore-packages/releases/download/prebuilt/quickstart-binary-0.11.9.tar.gz
  cache_enabled: true
  cache_dir: /cache
  cache_max_size: 10737418240

builtin_mirrors:
  dockerhub: []
  ghcr: []
