name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go test ./... -count=1
      - run: go vet ./...
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/pullfusion ./cmd/pullfusion/

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Check Docker Hub secrets
        id: check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "push=true" >> $GITHUB_OUTPUT
          else
            echo "push=false" >> $GITHUB_OUTPUT
          fi
      - name: Login to Docker Hub
        if: steps.check.outputs.push == "true"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.architecture
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ steps.check.outputs.push }}
          tags: |
            pullfusion/pullfusion:latest
            pullfusion/pullfusion:${{ github.ref_name }}
